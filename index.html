<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc mừng Quốc tế Phụ nữ 8/3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="bg-music" src="assets/music.mp3" loop></audio>

    <div id="start-screen">
        <div id="hold-button">Giữ 3 giây để bắt đầu</div>
        <div id="progress-bar"></div>
    </div>

    <div id="letter-icon" class="hidden">💌</div>

    <div id="letter-content" class="hidden">
        <div class="letter-inner">
            <button id="close-letter">×</button>
            <h2>Happy Women's Day 🌸</h2>
            <p>Chúc bạn luôn xinh đẹp, hạnh phúc và gặp thật nhiều may mắn trong cuộc sống.</p>
        </div>
    </div>

    <canvas id="canvas3d"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
